# Perspicacité — OpenClaw agent preset
#
# Routes every internal LLM call through your local OpenClaw agent
# (https://github.com/openclaw/openclaw) as a subprocess.
#
# **⚠ Best-effort preset.** OpenClaw is a multi-channel agent
# platform, not primarily a single-shot completion CLI. The
# `openclaw agent --message "..."` invocation works for one-shot
# prompts but its output shape (plain text vs JSON, key names) may
# change across releases. Verify with `openclaw agent --help` and
# tweak the fields below if needed.
#
# OpenClaw selects the LLM via `~/.openclaw/openclaw.json`
# (`agent.model: "<provider>/<model-id>"`), not a CLI flag — so the
# `default_model` field below is informational only.
#
# **Prerequisites:**
# 1. Install + configure OpenClaw (see project README).
# 2. Ensure the gateway is running:  `openclaw onboard --install-daemon`
# 3. Verify:  `openclaw agent --message "say hi"`
# 4. Use this file as your config:
#       perspicacite -c config.openclaw.example.yml serve
#
# Same caveats as the other agent-CLI presets: no prompt caching, no
# per-call temperature/max_tokens, output buffered (no streaming).

llm:
  default_provider: "agent_cli"
  default_model:    "default"           # OpenClaw picks the model from its own config

  providers_per_stage:
    routing:          "agent_cli"
    screening:        "agent_cli"
    rephrase:         "agent_cli"
    contextual:       "agent_cli"
    synthesis_basic:  "agent_cli"
    synthesis_heavy:  "agent_cli"

  providers:
    agent_cli:
      base_url: ""
      executable: "openclaw"
      timeout: 240
      max_retries: 1

      # OpenClaw takes the prompt via --message; no stdin.
      prompt_via: "arg"
      prompt_flag: "--message"
      extra_args: ["agent"]             # subcommand

      # No system-prompt flag in current openclaw — the system prompt
      # ends up prepended to the body via _flatten_messages.
      system_flag: null

      # OpenClaw doesn't take --model on the CLI; the model is
      # picked from ~/.openclaw/openclaw.json. Leaving model_flag
      # null means we just don't pass one.
      model_flag: null

      # Default output is plain text. If your version supports a
      # `--json` flag, set output_format: "json" and result_json_path
      # to the right key (commonly "response" or "result").
      output_format: "text"
      result_json_path: null

      model_aliases: {}

      # OpenClaw uses a `--thinking` knob that some users may want
      # to fix to high quality; uncomment to apply globally:
      # extra_args: ["agent", "--thinking", "high"]

      env_extra: {}
