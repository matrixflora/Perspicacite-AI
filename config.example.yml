# Copy to config.yml and fill in. config.yml is git-ignored.

# Perspicacité v2 Configuration

version: "2.0.0"
config_name: "anthropic-default"

# =============================================================================
# Server Settings
# =============================================================================

server:
  host: "0.0.0.0"
  port: 8000
  reload: false

# =============================================================================
# LLM Configuration — Anthropic default
# API keys are set via environment variables:
#   ANTHROPIC_API_KEY, DEEPSEEK_API_KEY, OPENAI_API_KEY
# =============================================================================

llm:
  default_provider: "anthropic"
  default_model: "claude-3-5-sonnet-20241022"

  providers:
    anthropic:
      base_url: "https://api.anthropic.com"
      timeout: 120
      max_retries: 3

    deepseek:
      base_url: "https://api.deepseek.com"
      timeout: 120
      max_retries: 3

    openai:
      base_url: "https://api.openai.com/v1"
      timeout: 60
      max_retries: 3

  context:
    max_tokens: 8000
    chat_history_turns: 10
    summarize_threshold: 20

# =============================================================================
# Knowledge Base Configuration
# =============================================================================

knowledge_base:
  embedding_model: "text-embedding-3-small"
  chunk_size: 1000
  chunk_overlap: 200
  chunking_method: "token"
  default_top_k: 10
  similarity_threshold: 0.7
  use_two_pass: true

# =============================================================================
# Database Configuration
# =============================================================================

database:
  path: "~/.local/share/perspicacite/memory.db"
  chroma_path: "./chroma_db"

# =============================================================================
# RAG Mode Settings
# =============================================================================

rag_modes:
  basic:
    max_iterations: 1
    use_hybrid: true

  advanced:
    max_iterations: 2
    use_hybrid: true
    use_wrrf: true
    enable_reflection: false
    query_expansion: true

  profound:
    max_iterations: 3
    use_hybrid: true
    use_wrrf: true
    enable_planning: true
    enable_reflection: true

  agentic:
    max_iterations: 5
    use_hybrid: true
    early_exit_confidence: 0.85

# =============================================================================
# SciLEx Integration
# =============================================================================

scilex:
  enabled: true

  apis:
    semantic_scholar:
      enabled: true
      rate_limit: 100
    openalex:
      enabled: true
      rate_limit: 100
    pubmed:
      enabled: true
      rate_limit: 10
    arxiv:
      enabled: true
      rate_limit: 100
    hal:
      enabled: true
      rate_limit: 100
    dblp:
      enabled: true
      rate_limit: 100
    istex:
      enabled: true
      rate_limit: 100
    ieee:
      enabled: false
    springer:
      enabled: false
    elsevier:
      enabled: false

# =============================================================================
# Web Search Configuration
# =============================================================================

web_search:
  providers: ["google_scholar", "semantic_scholar"]
  cache_ttl: 3600

# =============================================================================
# PDF Download Configuration
# =============================================================================

pdf_download:
  # Email for Unpaywall API (required for querying open access PDFs)
  # Get one at: https://unpaywall.org/products/api
  unpaywall_email: "you@example.com"

  # Alternative endpoint for PDF downloads (e.g., Sci-Hub mirror)
  # User must provide their own endpoint URL
  # Example: "https://sci-hub.se/"
  alternative_endpoint: ""

  # Wiley TDM (Text and Data Mining) API Token
  # Register at: https://developer.wiley.com/api/wiley-text-and-data-mining-tdm/
  wiley_tdm_token: ""

  # Elsevier ScienceDirect API Key
  # Register at: https://dev.elsevier.com/
  elsevier_api_key: ""

  # Semantic Scholar API Key
  # Register at: https://www.semanticscholar.org/product/api#api-key
  semantic_scholar_api_key: ""

  # AAAS (Science journals) API Key
  # For institutional access to Science, Science Advances, etc
  # aaas_api_key: ""

  # Royal Society of Chemistry (RSC) API Key
  # Register at: https://api.rsc.org/
  # rsc_api_key: ""

  # Springer Nature API Key
  # Register at: https://dev.springernature.com/
  # springer_api_key: ""

  # Timeout for PDF downloads (seconds)
  timeout: 30

  # Maximum retries for failed downloads
  max_retries: 3

# =============================================================================
# MCP Server Configuration
# =============================================================================

mcp:
  enabled: true
  host: "0.0.0.0"
  port: 8000
  transport: "streamable-http"  # co-hosted with FastAPI at /mcp

# =============================================================================
# Authentication
# =============================================================================

auth:
  enabled: true
  # Token set via PERSPICACITE_AUTH_TOKEN environment variable

# =============================================================================
# UI Configuration
# =============================================================================

ui:
  theme: "system"
  citation_format: "nature"

# =============================================================================
# Logging
# =============================================================================

logging:
  level: "INFO"
  format: "json"
