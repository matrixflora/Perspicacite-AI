# Perspicacité v2 Configuration
# Copy this file to config.yml and customize as needed

version: "2.0.0"
config_name: "default"

# =============================================================================
# Server Settings
# =============================================================================

server:
  host: "0.0.0.0"
  port: 8000
  reload: false  # Enable for development

# =============================================================================
# LLM Configuration
# =============================================================================
# API keys are set via environment variables:
#   - DEEPSEEK_API_KEY
#   - ANTHROPIC_API_KEY
#   - OPENAI_API_KEY
#   - MINIMAX_API_KEY

llm:
  default_provider: "deepseek"
  default_model: "deepseek-chat"

  # Provider configurations
  providers:
    deepseek:
      base_url: "https://api.deepseek.com"
      timeout: 120
      max_retries: 3

    anthropic:
      base_url: "https://api.anthropic.com"
      timeout: 120
      max_retries: 3

    openai:
      base_url: "https://api.openai.com/v1"
      timeout: 60
      max_retries: 3

  # Context settings
  context:
    max_tokens: 8000
    chat_history_turns: 10
    summarize_threshold: 20

# =============================================================================
# Knowledge Base Configuration
# =============================================================================

knowledge_base:
  embedding_model: "text-embedding-3-small"
  chunk_size: 1000
  chunk_overlap: 200
  # Chunking method: "token" (fast, word-based), "semantic" (embedding-based),
  # or "agentic" (LLM-based intelligent partitioning)
  chunking_method: "token"
  preserve_sections: true
  default_top_k: 10
  similarity_threshold: 0.7

# =============================================================================
# Database Configuration
# =============================================================================

database:
  path: "~/.local/share/perspicacite/memory.db"
  chroma_path: "./chroma_db"

# =============================================================================
# RAG Mode Settings
# =============================================================================
# Mode names used by the web app and API: basic, advanced, profound, agentic

rag_modes:
  # Basic mode - fast, simple retrieval with optional hybrid
  basic:
    max_iterations: 1
    use_hybrid: true  # Enable BM25 + vector hybrid retrieval

  # Advanced mode - query expansion + WRRF fusion + hybrid retrieval
  advanced:
    max_iterations: 2
    use_hybrid: true
    use_wrrf: true
    enable_reflection: false
    query_expansion: true

  # Profound mode - multi-cycle research with WRRF and hybrid retrieval
  profound:
    max_iterations: 3
    use_hybrid: true
    use_wrrf: true  # Enable Weighted Reciprocal Rank Fusion for multi-query
    enable_planning: true
    enable_reflection: true

  # Agentic mode - autonomous agent with tool use
  agentic:
    max_iterations: 5
    use_hybrid: true  # Enable hybrid retrieval for KB searches
    early_exit_confidence: 0.85

# =============================================================================
# SciLEx Integration
# =============================================================================

scilex:
  enabled: true

  apis:
    semantic_scholar:
      enabled: true
      rate_limit: 100
    openalex:
      enabled: true
      rate_limit: 100
    pubmed:
      enabled: true
      rate_limit: 10
    arxiv:
      enabled: true
      rate_limit: 100
    hal:
      enabled: true
      rate_limit: 100
    dblp:
      enabled: true
      rate_limit: 100
    istex:
      enabled: true
      rate_limit: 100
    # APIs requiring keys (disabled by default)
    ieee:
      enabled: false
    springer:
      enabled: false
    elsevier:
      enabled: false

# =============================================================================
# Web Search Configuration
# =============================================================================

web_search:
  providers: ["google_scholar", "semantic_scholar"]
  cache_ttl: 3600

# =============================================================================
# PDF Download Configuration
# =============================================================================

pdf_download:
  # Email for Unpaywall API (required — must be a REAL email address)
  # Unpaywall rejects disposable/example addresses.
  # Sign up at: https://unpaywall.org/products/api
  # unpaywall_email: "you@university.edu"

  # Publisher API keys for institutional access
  # These enable downloading papers when Unpaywall doesn't have OA versions

  # === Open Access (no key needed) ===
  # arXiv: Fully open access, no registration needed

  # === API Key Required ===

  # Wiley TDM (Text and Data Mining) API Token
  # Register at: https://developer.wiley.com/api/wiley-text-and-data-mining-tdm/
  # wiley_tdm_token: "your-wiley-tdm-token"

  # Elsevier ScienceDirect API Key
  # Register at: https://dev.elsevier.com/
  # Note: Elsevier API returns XML/text content, not PDF
  # elsevier_api_key: "your-elsevier-api-key"

  # AAAS (Science journals) API Key
  # For institutional access to Science, Science Advances, etc.
  # aaas_api_key: "your-aaas-api-key"

  # Royal Society of Chemistry (RSC) API Key
  # Register at: https://api.rsc.org/
  # rsc_api_key: "your-rsc-api-key"

  # Springer Nature API Key
  # Register at: https://dev.springernature.com/
  # springer_api_key: "your-springer-api-key"

  # === IP-based Access (no key needed) ===
  # ACS (American Chemical Society): Uses institutional IP recognition
  # Some ACS articles are Open Access (ACS AuthorChoice)

  # Timeout for PDF downloads (seconds)
  timeout: 30

  # Maximum retries for failed downloads
  max_retries: 3

# =============================================================================
# MCP Server Configuration
# =============================================================================

mcp:
  enabled: true
  host: "0.0.0.0"
  port: 5001
  transport: "streamable-http"

# =============================================================================
# Authentication
# =============================================================================

auth:
  enabled: true
  # Token set via PERSPICACITE_AUTH_TOKEN environment variable

# =============================================================================
# UI Configuration
# =============================================================================

ui:
  theme: "system"
  citation_format: "nature"

# =============================================================================
# Logging
# =============================================================================

logging:
  level: "INFO"
  format: "json"
