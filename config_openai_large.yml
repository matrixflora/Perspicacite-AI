# Perspicacité config — OpenAI text-embedding-3-large — RECOMMENDED when cross-domain generalisation matters
#
# text-embedding-3-large is the recommended embedding when the KB spans multiple domains
# or when the best possible generalisation across query types is needed.
#
# Benchmark (SciFact biomedical, 188 dev claims):
#   NDCG@10 = 0.872  R@5 = 0.951  MRR = 0.855  (vector + ms-marco-MiniLM-L-12-v2)
#
# Cross-domain benchmark (NFCorpus nutrition, 323 queries):
#   NDCG@10 = 0.327  vs BGE-M3 = 0.249  vs MiniLM = 0.242  ← OpenAI wins by +7.8 pp
#
# Why ms-marco reranker (NOT bge-reranker) for OpenAI?
#   Critical finding: bge-reranker-v2-m3 HURTS OpenAI 3-large by −2.1 pp NDCG.
#   OpenAI's 3072-dim embeddings already deliver uniformly high-quality top-20;
#   bge-reranker's aggressive reranking introduces noise. ms-marco is conservative.
#
# Costs: ~$0.13 / 1M tokens for embedding (new docs only; queries are cheap).
# HyDE: do NOT enable — confirmed −6.2 pp NDCG vs plain vector on SciFact.
#
# Full benchmark: perspicacite-eval/docs/retrieval_benchmark_2026_05_26.md
#
# Launch:
#   OPENAI_API_KEY=$OPENAI_API_KEY uv run perspicacite -c config_openai_large.yml serve

version: "2.0.0"
config_name: "openai-large-port8002"

server:
  host: "0.0.0.0"
  port: 8002
  reload: false

llm:
  # Paid OpenRouter with Anthropic Claude Haiku 4.5 as the default.
  # Switched from deepseek/deepseek-v4-flash because that model returned
  # empty strings intermittently on small structured prompts (search
  # optimizer, query variations, etc.), causing visible UX glitches:
  #   - optimizer "unparseable" on cache hits
  #   - advanced-mode "Searching with 1 query variations" (loop bailed
  #     on first empty response)
  # Haiku 4.5 is ~500 ms, ~$0.80/$4 per M tokens, and adheres to JSON
  # schemas reliably.
  default_provider: "openrouter"
  default_model: "anthropic/claude-haiku-4-5"

  providers:
    openrouter:
      base_url: "https://openrouter.ai/api/v1"
      timeout: 120
      max_retries: 3

    anthropic:
      base_url: "https://api.anthropic.com"
      timeout: 120
      max_retries: 3

    openai:
      base_url: "https://api.openai.com/v1"
      timeout: 60
      max_retries: 3

  context:
    max_tokens: 8000
    chat_history_turns: 10

knowledge_base:
  embedding_model: "text-embedding-3-large"
  chunk_size: 1000
  chunk_overlap: 200
  chunking_method: "token"
  default_top_k: 10
  similarity_threshold: 0.0
  use_two_pass: true

database:
  path: "~/.local/share/perspicacite/memory.db"
  chroma_path: "./chroma_db"

rag_modes:
  # ms-marco-MiniLM-L-12-v2: the correct reranker for OpenAI 3-large.
  # bge-reranker-v2-m3 was tested and HURTS OpenAI (−2.1 pp NDCG, −3.6 pp R@5).
  # ms-marco is conservative — preserves OpenAI's already-excellent embedding order.
  # Rule: strong embedding → conservative reranker. Weak embedding → aggressive reranker.
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-12-v2"

  basic:
    max_iterations: 1
    use_hybrid: true

  advanced:
    max_iterations: 2
    use_hybrid: true
    use_wrrf: true

scilex:
  enabled: false

# Required for the standalone PubMed-Entrez provider to register at
# startup. Without a real address build_aggregator logs
# 'build_aggregator_pubmed_skipped_no_email' and PubMed silently drops
# out of the aggregator. Mirrors config.yml.
pdf_download:
  unpaywall_email: "tao.jiang@univ-cotedazur.fr"

# Mirror config.yml's provider allowlist so users can actually select
# google_scholar / dblp_sparql in the chat UI without the new
# selection_unavailable safeguard rejecting their picks. Stays a subset
# of providers Perspicacité knows how to build — adding e.g. "ads"
# requires ads_api_key in pdf_download or a separate ads block.
search:
  enabled_providers:
    - europepmc
    - pubchem
    - core
    - inspire
    - google_scholar
    - dblp_sparql

# Headless Google Scholar via Playwright + OpenRouter Exa fallback.
# Requires `uv sync --extra browser` and `uv run playwright install
# chromium` once. See README ("Google Scholar (optional)").
google_scholar:
  enabled: true
  headless: true
  delay_seconds: 2.0
  max_results: 20
  openrouter_fallback_enabled: true
  openrouter_fallback_model: "deepseek/deepseek-v4-flash"
  openrouter_fallback_domains:
    - "arxiv.org"
    - "biorxiv.org"
    - "chemrxiv.org"
    - "pubmed.ncbi.nlm.nih.gov"
    - "europepmc.org"
    - "semanticscholar.org"
    - "crossref.org"
    - "nature.com"
    - "sciencedirect.com"
    - "springer.com"
    - "wiley.com"

mcp:
  enabled: true
  host: "0.0.0.0"
  port: 8002
  transport: "streamable-http"

auth:
  enabled: true

logging:
  level: "INFO"
  format: "json"
