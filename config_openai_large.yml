# Perspicacité config — OpenAI text-embedding-3-large on port 8002
# Used for eval experiments alongside MiniLM (:8000) and SPECTER2 (:8001).
# See perspicacite-eval docs/qads_2026_05_25.md for results context.
#
# Key overrides vs config.yml:
#   server.port:                       8002
#   knowledge_base.embedding_model:    text-embedding-3-large  (3072-dim, OpenAI)
#   knowledge_base.similarity_threshold: 0.0  (cosine distribution differs from MiniLM)
#
# Requires OPENAI_API_KEY in shell environment.
#
# Launch:
#   OPENAI_API_KEY=$OPENAI_API_KEY uv run perspicacite -c config_openai_large.yml serve

version: "2.0.0"
config_name: "openai-large-port8002"

server:
  host: "0.0.0.0"
  port: 8002
  reload: false

llm:
  default_provider: "openrouter"
  default_model: "deepseek/deepseek-v4-flash"

  providers:
    openrouter:
      base_url: "https://openrouter.ai/api/v1"
      timeout: 120
      max_retries: 3

    anthropic:
      base_url: "https://api.anthropic.com"
      timeout: 120
      max_retries: 3

    openai:
      base_url: "https://api.openai.com/v1"
      timeout: 60
      max_retries: 3

  context:
    max_tokens: 8000
    chat_history_turns: 10

knowledge_base:
  embedding_model: "text-embedding-3-large"
  chunk_size: 1000
  chunk_overlap: 200
  chunking_method: "token"
  default_top_k: 10
  similarity_threshold: 0.0
  use_two_pass: true

database:
  path: "~/.local/share/perspicacite/memory.db"
  chroma_path: "./chroma_db"

rag_modes:
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"

  basic:
    max_iterations: 1
    use_hybrid: true

  advanced:
    max_iterations: 2
    use_hybrid: true
    use_wrrf: true

scilex:
  enabled: false

mcp:
  enabled: true
  host: "0.0.0.0"
  port: 8002
  transport: "streamable-http"

auth:
  enabled: true

logging:
  level: "INFO"
  format: "json"
