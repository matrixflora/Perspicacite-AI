# Perspicacité config — Alibaba-NLP/gte-Qwen2-7B-instruct — best cross-domain
#
# gte-Qwen2-7B-instruct: 7B model, 3584-dim, best zero-shot NDCG on MTEB avg.
# Top on SciDocs (nDCG@10 ≈ 0.2891) — best for citation-prediction tasks.
# Also strong on cross-domain medical (NFCorpus ≈ 0.41).
#
# Expected benchmarks (BEIR, zero-shot):
#   SciFact  NDCG@10 ≈ 0.79   (with reranker, slightly below BGE-M3 0.879)
#   NFCorpus NDCG@10 ≈ 0.40–0.41   (vs MiniLM 0.316)
#   SciDocs  nDCG@10 ≈ 0.28–0.29   (vs MiniLM 0.1055 — ~3× better)
#
# Hardware: 7B model — ~14 GB VRAM (FP16), ~7.5 GB (INT8).
# On Apple M2 Max (64 GB unified memory): runs on MPS.
# Ingest will be slower than smaller models but feasible for SciFact-size corpora.
#
# GPU: auto-detected (MPS on Apple Silicon, CUDA on NVIDIA, CPU fallback).
#
# Note: requires `st:` prefix since Alibaba-NLP/ is not in auto-detected namespaces.
#
# Launch:
#   uv run perspicacite -c configs/embedders/gte_qwen2_7b.yml serve

version: "2.0.0"
config_name: "gte-qwen2-7b-port8007"

server:
  host: "0.0.0.0"
  port: 8007
  reload: false

llm:
  default_provider: "openrouter"
  default_model: "deepseek/deepseek-v4-flash"

  providers:
    openrouter:
      base_url: "https://openrouter.ai/api/v1"
      timeout: 120
      max_retries: 3

    anthropic:
      base_url: "https://api.anthropic.com"
      timeout: 120
      max_retries: 3

  context:
    max_tokens: 8000
    chat_history_turns: 10

knowledge_base:
  embedding_model: "st:Alibaba-NLP/gte-Qwen2-7B-instruct"  # st: prefix → sentence-transformers
  chunk_size: 1000
  chunk_overlap: 200
  chunking_method: "token"
  default_top_k: 10
  similarity_threshold: 0.0    # LLM-based; cosine scores differ from BERT models
  use_two_pass: true

database:
  path: "~/.local/share/perspicacite/memory.db"
  chroma_path: "./chroma_db"

rag_modes:
  reranker_model: "BAAI/bge-reranker-v2-m3"

  basic:
    max_iterations: 1
    use_hybrid: true

  advanced:
    max_iterations: 2
    use_hybrid: true
    use_wrrf: true

scilex:
  enabled: false

mcp:
  enabled: true
  host: "0.0.0.0"
  port: 8007
  transport: "streamable-http"

auth:
  enabled: true

logging:
  level: "INFO"
  format: "json"
